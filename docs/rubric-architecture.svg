<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1080" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <linearGradient id="md-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="loader-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="value-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1280" height="1080" fill="#f8fafc"/>

  <text x="640" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Where the Rubric Skills Deliver Value</text>
  <text x="640" y="62" text-anchor="middle" font-size="14" fill="#475569">Markdown rubrics are the system prompt — agent behavior lives in editable files, not code</text>

  <!-- ============== SMEs / Authors ============== -->
  <g filter="url(#sh)">
    <rect x="40" y="90" width="240" height="200" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  </g>
  <text x="160" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Subject-matter experts</text>
  <text x="160" y="132" text-anchor="middle" font-size="11" fill="#64748b">no code change required</text>

  <g font-size="12" fill="#0f172a">
    <rect x="60" y="148" width="200" height="36" rx="5" fill="#fef3c7" stroke="#eab308"/>
    <text x="160" y="163" text-anchor="middle" font-weight="600">Clinical reviewer</text>
    <text x="160" y="178" text-anchor="middle" font-size="10" fill="#713f12">ICD ↔ CPT pairing rules</text>

    <rect x="60" y="190" width="200" height="36" rx="5" fill="#fee2e2" stroke="#ef4444"/>
    <text x="160" y="205" text-anchor="middle" font-weight="600" fill="#7f1d1d">Compliance / Privacy</text>
    <text x="160" y="220" text-anchor="middle" font-size="10" fill="#7f1d1d">PHI &amp; HIPAA guardrails</text>

    <rect x="60" y="232" width="200" height="36" rx="5" fill="#dcfce7" stroke="#16a34a"/>
    <text x="160" y="247" text-anchor="middle" font-weight="600" fill="#14532d">Operations</text>
    <text x="160" y="262" text-anchor="middle" font-size="10" fill="#14532d">verification thresholds, tone</text>
  </g>

  <line x1="280" y1="190" x2="320" y2="190" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="300" y="180" font-size="10" fill="#475569" text-anchor="middle">edit .md</text>

  <!-- ============== Markdown source files ============== -->
  <g filter="url(#sh)">
    <rect x="320" y="90" width="380" height="380" rx="10" fill="url(#md-grad)" stroke="#ea580c" stroke-width="1.5"/>
  </g>
  <text x="510" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Source of truth — skills/*.md</text>
  <text x="510" y="132" text-anchor="middle" font-size="11" fill="#9a3412">version-controlled markdown · YAML frontmatter</text>

  <!-- shared include -->
  <g>
    <rect x="340" y="148" width="340" height="56" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-dasharray="3 2"/>
    <text x="510" y="167" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">_shared/phi-protection-rules.md</text>
    <text x="510" y="183" text-anchor="middle" font-size="10" fill="#9a3412">PHI/HIPAA: never reveal pre-verify · mask SSN ·</text>
    <text x="510" y="197" text-anchor="middle" font-size="10" fill="#9a3412">vague-before-verified · field visibility matrix</text>
  </g>

  <!-- 8 skill rubrics in a 2x4 grid -->
  <g font-size="11" fill="#7c2d12">
    <rect x="340" y="216" width="160" height="56" rx="5" fill="#ffffff" stroke="#ea580c"/>
    <text x="420" y="233" text-anchor="middle" font-weight="600">member-search-rubric.md</text>
    <text x="420" y="248" text-anchor="middle" font-size="10" fill="#9a3412">v1.1.0 · 3-of-N verify, DOB</text>
    <text x="420" y="262" text-anchor="middle" font-size="9" fill="#9a3412" font-style="italic">{{include: phi-protection}}</text>

    <rect x="520" y="216" width="160" height="56" rx="5" fill="#ffffff" stroke="#ea580c"/>
    <text x="600" y="233" text-anchor="middle" font-weight="600">procedure-search-rubric.md</text>
    <text x="600" y="248" text-anchor="middle" font-size="10" fill="#9a3412">v1.0.0 · CPT, contraindications</text>
    <text x="600" y="262" text-anchor="middle" font-size="9" fill="#9a3412" font-style="italic">{{include: phi-protection}}</text>

    <rect x="340" y="282" width="160" height="56" rx="5" fill="#ffffff" stroke="#ea580c"/>
    <text x="420" y="299" text-anchor="middle" font-weight="600">provider-search-rubric.md</text>
    <text x="420" y="314" text-anchor="middle" font-size="10" fill="#9a3412">v1.0.0 · NPI, network status</text>
    <text x="420" y="328" text-anchor="middle" font-size="9" fill="#9a3412" font-style="italic">{{include: phi-protection}}</text>

    <rect x="520" y="282" width="160" height="56" rx="5" fill="#ffffff" stroke="#ea580c"/>
    <text x="600" y="299" text-anchor="middle" font-weight="600">facility-search-rubric.md</text>
    <text x="600" y="314" text-anchor="middle" font-size="10" fill="#9a3412">v1.0.0 · POS validation</text>
    <text x="600" y="328" text-anchor="middle" font-size="9" fill="#9a3412" font-style="italic">{{include: phi-protection}}</text>

    <rect x="340" y="348" width="160" height="56" rx="5" fill="#ffffff" stroke="#ea580c"/>
    <text x="420" y="365" text-anchor="middle" font-weight="600">clinical-context-rubric.md</text>
    <text x="420" y="380" text-anchor="middle" font-size="10" fill="#9a3412">v1.0.0 · ICD-10, conservative tx</text>
    <text x="420" y="394" text-anchor="middle" font-size="9" fill="#9a3412" font-style="italic">{{include: phi-protection}}</text>

    <rect x="520" y="348" width="160" height="56" rx="5" fill="#ffffff" stroke="#ea580c"/>
    <text x="600" y="365" text-anchor="middle" font-weight="600">preflight-rubric.md</text>
    <text x="600" y="380" text-anchor="middle" font-size="10" fill="#9a3412">v1.0.0 · explain verbatim</text>
    <text x="600" y="394" text-anchor="middle" font-size="9" fill="#9a3412" font-style="italic">{{include: phi-protection}}</text>

    <rect x="340" y="414" width="160" height="48" rx="5" fill="#ffffff" stroke="#ea580c"/>
    <text x="420" y="432" text-anchor="middle" font-weight="600">submit-rubric.md</text>
    <text x="420" y="448" text-anchor="middle" font-size="10" fill="#9a3412">v1.0.0 · final confirmation</text>

    <rect x="520" y="414" width="160" height="48" rx="5" fill="#ffffff" stroke="#ea580c"/>
    <text x="600" y="432" text-anchor="middle" font-weight="600">done-rubric.md</text>
    <text x="600" y="448" text-anchor="middle" font-size="10" fill="#9a3412">v1.0.0 · post-decision Q&amp;A</text>
  </g>

  <!-- include arrows -->
  <g stroke="#ea580c" stroke-width="1" stroke-dasharray="3 2" fill="none">
    <line x1="510" y1="204" x2="420" y2="216" marker-end="url(#arr-orange)"/>
    <line x1="510" y1="204" x2="600" y2="216" marker-end="url(#arr-orange)"/>
    <line x1="510" y1="204" x2="420" y2="282" marker-end="url(#arr-orange)"/>
    <line x1="510" y1="204" x2="600" y2="282" marker-end="url(#arr-orange)"/>
    <line x1="510" y1="204" x2="420" y2="348" marker-end="url(#arr-orange)"/>
    <line x1="510" y1="204" x2="600" y2="348" marker-end="url(#arr-orange)"/>
  </g>

  <!-- ============== Value bullets sidebar ============== -->
  <g filter="url(#sh)">
    <rect x="730" y="90" width="510" height="380" rx="10" fill="url(#value-grad)" stroke="#ca8a04" stroke-width="1.5"/>
  </g>
  <text x="985" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">Value delivered</text>

  <g font-size="12" fill="#422006">
    <text x="750" y="140" font-weight="700">①  Behavior in markdown, not C#</text>
    <text x="772" y="156" font-size="11">SkillBase.ResolveSystemPrompt() returns the rendered rubric;</text>
    <text x="772" y="170" font-size="11">it IS the system prompt. No string concatenation in code.</text>

    <text x="750" y="192" font-weight="700">②  One PHI policy, applied everywhere</text>
    <text x="772" y="208" font-size="11">{{include:_shared/phi-protection-rules.md}} flows into every</text>
    <text x="772" y="222" font-size="11">skill. Compliance edits one file → all 7 skills updated.</text>

    <text x="750" y="244" font-weight="700">③  Hot reload without redeploy</text>
    <text x="772" y="260" font-size="11">RubricRefreshService swaps the cache atomically during a</text>
    <text x="772" y="274" font-size="11">nightly window — but only when InFlightCounter == 0.</text>

    <text x="750" y="296" font-weight="700">④  Versioned + tagged = auditable</text>
    <text x="772" y="312" font-size="11">YAML frontmatter (name, version, tags). Trace which</text>
    <text x="772" y="326" font-size="11">policy version was active for any PA decision.</text>

    <text x="750" y="348" font-weight="700">⑤  Per-state separation</text>
    <text x="772" y="364" font-size="11">Each skill loads only its rubric + AllowedTools whitelist.</text>
    <text x="772" y="378" font-size="11">Small focused prompts → faster, cheaper, easier to reason about.</text>

    <text x="750" y="400" font-weight="700">⑥  Fail fast on broken rubrics</text>
    <text x="772" y="416" font-size="11">Throws InvalidOperationException if rendered rubric &lt; 200 chars.</text>
    <text x="772" y="430" font-size="11">No silent degradation — startup crashes loudly.</text>

    <text x="750" y="452" font-weight="700">⑦  Identity contract for Demo mode</text>
    <text x="772" y="468" font-size="11">ScriptedChatClient routes by the rubric's name: field. The rubric is load-bearing even without an LLM.</text>
  </g>

  <!-- ============== Loader pipeline ============== -->
  <line x1="510" y1="470" x2="510" y2="500" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>

  <g filter="url(#sh)">
    <rect x="160" y="500" width="700" height="170" rx="10" fill="url(#loader-grad)" stroke="#2563eb" stroke-width="1.5"/>
  </g>
  <text x="510" y="525" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Loader pipeline (AgenticPA.Agent.Skills)</text>

  <rect x="180" y="540" width="320" height="115" rx="8" fill="#ffffff" stroke="#2563eb"/>
  <text x="340" y="560" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">SkillRubricLoader</text>
  <text x="340" y="580" text-anchor="middle" font-size="11" fill="#1e40af">ReadWithIncludes() resolves {{include:}} recursively</text>
  <text x="340" y="596" text-anchor="middle" font-size="11" fill="#1e40af">ConcurrentDictionary cache, keyed by file name</text>
  <text x="340" y="612" text-anchor="middle" font-size="11" fill="#1e40af">Interlocked.Exchange swap (read-safe under refresh)</text>
  <text x="340" y="630" text-anchor="middle" font-size="11" fill="#1e40af">Dev: AlwaysReloadFromDisk = bypass cache</text>
  <text x="340" y="648" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">SkillRubricLoader.cs:38</text>

  <rect x="520" y="540" width="320" height="115" rx="8" fill="#ffffff" stroke="#2563eb"/>
  <text x="680" y="560" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">RubricRefreshService (BackgroundService)</text>
  <text x="680" y="580" text-anchor="middle" font-size="11" fill="#1e40af">Polls every PollIntervalSeconds</text>
  <text x="680" y="596" text-anchor="middle" font-size="11" fill="#1e40af">Refreshes only inside [WindowStartHour, WindowEndHour]</text>
  <text x="680" y="612" text-anchor="middle" font-size="11" fill="#1e40af">Idle gate: InFlightCounter == 0 + IdleFor ≥ QuiescePeriod</text>
  <text x="680" y="630" text-anchor="middle" font-size="11" fill="#1e40af">At most one refresh per local-time day</text>
  <text x="680" y="648" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">RubricRefreshService.cs:31</text>

  <line x1="510" y1="670" x2="510" y2="700" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- ============== SkillBase: per-turn use ============== -->
  <g filter="url(#sh)">
    <rect x="160" y="700" width="960" height="98" rx="10" fill="#ffffff" stroke="#94a3b8"/>
  </g>
  <text x="640" y="725" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Per turn — SkillBase.HandleTurnAsync</text>
  <text x="640" y="744" text-anchor="middle" font-size="12" fill="#334155" font-family="ui-monospace, Consolas, monospace">messages = [ ChatMessage(System, ResolveSystemPrompt() + ContextHint(ctx)), ...transcript, user ]</text>
  <text x="640" y="764" text-anchor="middle" font-size="11" fill="#475569">ResolveSystemPrompt validates rendered rubric (≥ 200 chars) — throws if missing.</text>
  <text x="640" y="782" text-anchor="middle" font-size="11" fill="#475569">Tools whitelist via AllowedTools[] → only that skill's MCP tools are exposed for the turn.</text>

  <line x1="640" y1="798" x2="640" y2="828" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- ============== IChatClient consumption ============== -->
  <g filter="url(#sh)">
    <rect x="160" y="828" width="960" height="80" rx="10" fill="#fef9c3" stroke="#eab308"/>
  </g>
  <text x="640" y="852" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">IChatClient — consumes the rubric as System message</text>
  <text x="640" y="872" text-anchor="middle" font-size="11" fill="#713f12">OpenAI mode: rubric directly steers LLM behavior · Demo mode: ScriptedChatClient routes by rubric name: field</text>
  <text x="640" y="890" text-anchor="middle" font-size="11" fill="#713f12">Output text is shaped by rubric → JSON {"action":...} extracted by SkillBase.ExtractCommand → workflow advances</text>

  <line x1="640" y1="908" x2="640" y2="938" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- ============== Per-skill mapping ============== -->
  <g filter="url(#sh)">
    <rect x="40" y="938" width="1200" height="112" rx="10" fill="#ffffff" stroke="#94a3b8"/>
  </g>
  <text x="60" y="962" font-size="13" font-weight="700" fill="#0f172a">Per-state binding — each PaState has exactly one rubric</text>

  <g font-size="10" fill="#0f172a">
    <rect x="60" y="975" width="135" height="62" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="127" y="993" text-anchor="middle" font-weight="600">MemberPending</text>
    <text x="127" y="1009" text-anchor="middle" fill="#64748b">→ MemberSkill</text>
    <text x="127" y="1024" text-anchor="middle" fill="#9a3412">member-search-rubric</text>

    <rect x="205" y="975" width="135" height="62" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="272" y="993" text-anchor="middle" font-weight="600">ProcedurePending</text>
    <text x="272" y="1009" text-anchor="middle" fill="#64748b">→ ProcedureSkill</text>
    <text x="272" y="1024" text-anchor="middle" fill="#9a3412">procedure-search-rubric</text>

    <rect x="350" y="975" width="135" height="62" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="417" y="993" text-anchor="middle" font-weight="600">ReqProviderPending</text>
    <text x="417" y="1009" text-anchor="middle" fill="#64748b">→ ProviderSkill</text>
    <text x="417" y="1024" text-anchor="middle" fill="#9a3412">provider-search-rubric</text>

    <rect x="495" y="975" width="135" height="62" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="562" y="993" text-anchor="middle" font-weight="600">FacilityPending</text>
    <text x="562" y="1009" text-anchor="middle" fill="#64748b">→ FacilitySkill</text>
    <text x="562" y="1024" text-anchor="middle" fill="#9a3412">facility-search-rubric</text>

    <rect x="640" y="975" width="135" height="62" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="707" y="993" text-anchor="middle" font-weight="600">ClinicalPending</text>
    <text x="707" y="1009" text-anchor="middle" fill="#64748b">→ ClinicalSkill</text>
    <text x="707" y="1024" text-anchor="middle" fill="#9a3412">clinical-context-rubric</text>

    <rect x="785" y="975" width="135" height="62" rx="5" fill="#fee2e2" stroke="#ef4444"/>
    <text x="852" y="993" text-anchor="middle" font-weight="600" fill="#7f1d1d">Preflight</text>
    <text x="852" y="1009" text-anchor="middle" fill="#7f1d1d">→ PreflightSkill</text>
    <text x="852" y="1024" text-anchor="middle" fill="#7f1d1d">preflight-rubric</text>

    <rect x="930" y="975" width="135" height="62" rx="5" fill="#fee2e2" stroke="#ef4444"/>
    <text x="997" y="993" text-anchor="middle" font-weight="600" fill="#7f1d1d">Submit</text>
    <text x="997" y="1009" text-anchor="middle" fill="#7f1d1d">→ SubmitSkill</text>
    <text x="997" y="1024" text-anchor="middle" fill="#7f1d1d">submit-rubric</text>

    <rect x="1075" y="975" width="135" height="62" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="1142" y="993" text-anchor="middle" font-weight="600">Done</text>
    <text x="1142" y="1009" text-anchor="middle" fill="#64748b">→ DoneSkill</text>
    <text x="1142" y="1024" text-anchor="middle" fill="#9a3412">done-rubric</text>
  </g>

  <text x="1142" y="1056" text-anchor="middle" font-size="9" fill="#7f1d1d" font-style="italic">red = rules-engine-bound; rubric only narrates verdict</text>
</svg>
